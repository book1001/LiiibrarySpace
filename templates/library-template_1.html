<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{LIBRARY_NAME}} Liiibrary.Space</title>
  <link rel="stylesheet" href="/font/font.css">
  <link rel="stylesheet" href="/library-page.css">
</head>
<body style="background: {{LIBRARY_COLOR}};">
  <h1>{{LIBRARY_NAME}} Liiibrary</h1>

  <div id="bookList"></div>

  <div id="bookCard" style="display:none;">
    <button id="closeBookCardBtn" type="button">Close</button>

    <h2 id="cardTitle"></h2>
    <p><strong>Author:</strong> <span id="cardAuthor"></span></p>
    <p><strong>Library:</strong> <span id="cardLibrary"></span></p>

    <strong>Note:</strong>
    <div id="cardNote"></div>

    <hr>

    <div>
      <strong>Add Note:</strong>
      <div><span id="liveNoteDate"></span></div>
      <input type="text" id="noteBorrowerInput" placeholder="borrower">
      <input type="text" id="noteCommentInput" placeholder="comment">
      <button id="addNoteSubmitBtn" type="button">add note</button>
    </div>

    <button id="openBookBtn" type="button">open book</button>
  </div>

  <script>
    window.CURRENT_LIBRARY = "{{LIBRARY_NAME}}";
  </script>
  <script src="/library-page.js"></script>
</body>
</html>
