<button id="clone-line">clone bunny</button>
<button id="remove-line">remove bunny</button>
<div can-mirror id="bunny-line"></div>

<script>
  const pen = document.getElementById('bunny-line');
  const btnClone = document.getElementById('clone-line');
  const btnRemove = document.getElementById('remove-line');

  btnClone.onclick = () => {
    const bunny = document.createElement('div');
    bunny.id = 'line-' + pen.children.length;
    bunny.style.width = '100px';
    bunny.style.height = '2px';
    bunny.style.background = 'black';
    bunny.setAttribute("can-mirror", "");
    bunny.classList.add('can-drag2');
    document.body.appendChild(bunny);
  };

  btnRemove.onclick = () => {
    pen.lastChild.remove();
  };

</script>

  <script>

document.querySelectorAll(".can-drag").forEach((item) => {
  const handle = item.querySelector(".drag-handle");

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  handle.addEventListener("mousedown", (e) => {
    isDragging = true;

    offsetX = e.clientX - item.offsetLeft;
    offsetY = e.clientY - item.offsetTop;

    item.style.position = "absolute";
    handle.style.cursor = "grabbing";

    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    item.style.left = `${e.clientX - offsetX}px`;
    item.style.top = `${e.clientY - offsetY}px`;
  });

  document.addEventListener("mouseup", () => {
    if (!isDragging) return;

    isDragging = false;
    handle.style.cursor = "grab";
  });
});

document.querySelectorAll(".can-drag2").forEach((item) => {
  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  item.addEventListener("mousedown", (e) => {
    isDragging = true;

    offsetX = e.clientX - item.offsetLeft;
    offsetY = e.clientY - item.offsetTop;

    item.style.position = "absolute";
    item.style.cursor = "grabbing";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    item.style.left = `${e.clientX - offsetX}px`;
    item.style.top = `${e.clientY - offsetY}px`;
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    item.style.cursor = "text";
  });
});
